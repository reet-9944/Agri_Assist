<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a5c2a" />
  <title>AgriAssist — AI Smart Farming Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'agri-1': '#145a2c',
            'agri-2': '#1e7a3e',
            'agri-3': '#2d9e55',
            'agri-4': '#47bc70',
            'agri-5': '#7dd49a',
            'agri-6': '#b6e8c8',
            'agri-7': '#e6f5eb',
            'agri-8': '#f3fbf6',
            'earth': '#8B5E0A',
          },
          fontFamily: {
            head: ['"Playfair Display"', 'Georgia', 'serif'],
            body: ['"Outfit"', 'system-ui', 'sans-serif'],
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4,0,0.6,1) infinite',
            'scan': 'scan 2s ease-in-out infinite',
            'float': 'float 3s ease-in-out infinite',
          },
          keyframes: {
            scan: { '0%,100%': { transform: 'scaleX(0.6)', opacity: '0.4' }, '50%': { transform: 'scaleX(1.1)', opacity: '0.8' } },
            float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-8px)' } },
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Outfit', system-ui, sans-serif; background: #f7faf4; color: #111c14; overflow-x: hidden; }
    .font-head { font-family: 'Playfair Display', Georgia, serif; }
    .leaflet-container { z-index: 1; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f3fbf6; }
    ::-webkit-scrollbar-thumb { background: #47bc70; border-radius: 3px; }
    .toggle { width: 42px; height: 24px; border-radius: 12px; background: #d1d5db; position: relative; cursor: pointer; transition: background 0.2s; }
    .toggle.on { background: #2d9e55; }
    .toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; border-radius: 50%; background: white; transition: left 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
    .toggle.on::after { left: 21px; }
    @keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
    .shimmer { background: linear-gradient(90deg, #e6f5eb 25%, #c8edd0 50%, #e6f5eb 75%); background-size: 400px 100%; animation: shimmer 1.5s infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
